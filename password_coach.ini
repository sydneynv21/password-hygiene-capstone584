password-coach/
├─ main.py                  # UI implementation and data flow/management
├─ pass_analysis.py         # deterministic checks (length, patterns/predictability, character variety, etc)
├─ prompt_builder.py        # builds prompt from risk scores, user experience level, NOT provided password
├─ ollama_client.py         # Ollama API calling 
├─ data/
│  ├─ rockyou_trimmed.txt     # trimmed down database of exposed passwords 
│  └─ words_dictionary.json   # dictionary of common words used in passwords
└─ tests/
   ├─ test_cases.py        # password analysis correctness test cases
   └─ test_runner.py       # runs test cases and generates output


Notes:
NIST Guidlines - single factor accounts: minimum 15 characters
                 with MFA: minimum 8 characters

